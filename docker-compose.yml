services:
  ingest-historic:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    env_file:
      - .env
    environment:
      DUCKDB_PATH: /app/data/flock.duckdb
    volumes:
      - ./data:/app/data
    command: ["python", "-m", "src.ingestion.load_historical_gbif"]

  ingest-incremental:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    env_file:
      - .env
    environment:
      DUCKDB_PATH: /app/data/flock.duckdb
    volumes:
      - ./data:/app/data
    command: ["python", "-m", "src.ingestion.load_incremental_gbif"]

  dbt:
    build:
      context: .
      dockerfile: src/dbt/Dockerfile.dbt
    working_dir: /usr/app/src/dbt
    env_file:
      - .env
    environment:
      DBT_PROFILES_DIR: /usr/app/src/dbt
      DUCKDB_PATH: /usr/app/data/flock.duckdb
    volumes:
      - ./src/dbt:/usr/app/src/dbt
      - ./data:/usr/app/data
    command: ["dbt", "build"]

  airflow-init:
    build:
      context: .
      dockerfile: src/airflow/Dockerfile
    env_file:
      - .env
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      DUCKDB_PATH: /opt/flock/data/flock.duckdb
      PYTHONPATH: /opt/flock
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-admin@example.com}
    volumes:
      - airflow-home:/opt/airflow
      - ./src/airflow/dags:/opt/airflow/dags
      - ./src/airflow/logs:/opt/airflow/logs
      - ./src/airflow/plugins:/opt/airflow/plugins
      - ./:/opt/flock
      - ./data:/opt/flock/data
    command:
      [
        "bash",
        "-lc",
        "airflow db migrate && (airflow users create --username \"$${AIRFLOW_ADMIN_USERNAME}\" --password \"$${AIRFLOW_ADMIN_PASSWORD}\" --firstname Air --lastname Flow --role Admin --email \"$${AIRFLOW_ADMIN_EMAIL}\" || true)",
      ]

  airflow-webserver:
    build:
      context: .
      dockerfile: src/airflow/Dockerfile
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      DUCKDB_PATH: /opt/flock/data/flock.duckdb
      PYTHONPATH: /opt/flock
    ports:
      - "8080:8080"
    volumes:
      - airflow-home:/opt/airflow
      - ./src/airflow/dags:/opt/airflow/dags
      - ./src/airflow/logs:/opt/airflow/logs
      - ./src/airflow/plugins:/opt/airflow/plugins
      - ./:/opt/flock
      - ./data:/opt/flock/data
    command: ["bash", "-lc", "airflow webserver"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=5)\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  airflow-scheduler:
    build:
      context: .
      dockerfile: src/airflow/Dockerfile
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      DUCKDB_PATH: /opt/flock/data/flock.duckdb
      PYTHONPATH: /opt/flock
    volumes:
      - airflow-home:/opt/airflow
      - ./src/airflow/dags:/opt/airflow/dags
      - ./src/airflow/logs:/opt/airflow/logs
      - ./src/airflow/plugins:/opt/airflow/plugins
      - ./:/opt/flock
      - ./data:/opt/flock/data
    command: ["bash", "-lc", "airflow scheduler"]

  superset-init:
    build:
      context: .
      dockerfile: src/superset/superset/Dockerfile
    env_file:
      - .env
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-flock-local-dev-secret-key}
      DUCKDB_PATH: /app/data/flock.duckdb
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME:-admin}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL:-admin@example.com}
    volumes:
      - ./data:/app/data
      - ./src/superset/superset/home:/app/superset_home
    command:
      [
        "bash",
        "-lc",
        "superset db upgrade && superset fab create-admin --username \"$${SUPERSET_ADMIN_USERNAME}\" --firstname Super --lastname Set --email \"$${SUPERSET_ADMIN_EMAIL}\" --password \"$${SUPERSET_ADMIN_PASSWORD}\" || true && superset init",
      ]

  superset:
    build:
      context: .
      dockerfile: src/superset/superset/Dockerfile
    depends_on:
      - superset-init
    env_file:
      - .env
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-flock-local-dev-secret-key}
      DUCKDB_PATH: /app/data/flock.duckdb
    ports:
      - "8088:8088"
    volumes:
      - ./data:/app/data
      - ./src/superset/superset/home:/app/superset_home
      - ./src/superset:/app/superset
    command:
      [
        "bash",
        "-lc",
        "superset run -h 0.0.0.0 -p 8088 --with-threads",
      ]

  pipeline-backend:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    depends_on:
      airflow-webserver:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DUCKDB_PATH: /app/data/flock.duckdb
      AIRFLOW_API_BASE_URL: http://airflow-webserver:8080/api/v1
      AIRFLOW_API_USER: ${AIRFLOW_ADMIN_USERNAME:-admin}
      AIRFLOW_API_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
      PIPELINE_FRONTEND_ORIGIN: http://localhost:3000
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3001/api/health', timeout=5)\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 10s

  pipeline-frontend:
    build:
      context: .
      dockerfile: src/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3001
    depends_on:
      pipeline-backend:
        condition: service_healthy
    ports:
      - "3000:80"

volumes:
  airflow-home:
