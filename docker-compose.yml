services:
  ingest-historic:
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    env_file:
      - .env
    environment:
      DUCKDB_PATH: /app/data/flock.duckdb
    volumes:
      - ./data:/app/data
    command: ["python", "belgium_historic_bulk_import.py"]

  ingest-incremental:
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    env_file:
      - .env
    environment:
      DUCKDB_PATH: /app/data/flock.duckdb
    volumes:
      - ./data:/app/data
    command: ["python", "gbif_incremental_import.py"]

  dbt:
    build:
      context: .
      dockerfile: dbt/Dockerfile.dbt
    working_dir: /usr/app/dbt
    env_file:
      - .env
    environment:
      DBT_PROFILES_DIR: /usr/app/dbt
      DUCKDB_PATH: /usr/app/data/flock.duckdb
    volumes:
      - ./dbt:/usr/app/dbt
      - ./data:/usr/app/data
    command: ["dbt", "build"]

  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    env_file:
      - .env
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      DUCKDB_PATH: /opt/flock/data/flock.duckdb
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./:/opt/flock
      - ./data:/opt/flock/data
    command: ["bash", "-lc", "airflow db migrate && airflow users create --username admin --password admin --firstname Air --lastname Flow --role Admin --email admin@example.com || true"]

  airflow-webserver:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    depends_on:
      - airflow-init
    env_file:
      - .env
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      DUCKDB_PATH: /opt/flock/data/flock.duckdb
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./:/opt/flock
      - ./data:/opt/flock/data
    command: ["bash", "-lc", "airflow webserver"]

  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    depends_on:
      - airflow-init
    env_file:
      - .env
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      DUCKDB_PATH: /opt/flock/data/flock.duckdb
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./:/opt/flock
      - ./data:/opt/flock/data
    command: ["bash", "-lc", "airflow scheduler"]
