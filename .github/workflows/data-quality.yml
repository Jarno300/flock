name: Data Pipeline Quality

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  dbt-structure:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate dbt structure
        run: python scripts/validate_dbt_structure.py

  dbt-parse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt DuckDB adapter
        run: pip install "dbt-duckdb>=1.8.1,<2.0.0"

      - name: Create CI dbt profile
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<'EOF'
          flock:
            target: ci
            outputs:
              ci:
                type: duckdb
                path: /tmp/ci.duckdb
                schema: analytics
                threads: 1
          EOF

      - name: dbt deps
        working-directory: src/dbt
        run: dbt deps

      - name: dbt parse
        working-directory: src/dbt
        run: dbt parse

      - name: dbt compile
        working-directory: src/dbt
        run: dbt compile

  python-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ingestion test dependencies
        run: pip install -r src/ingestion/requirements.txt

      - name: Run Python unit tests
        run: python -m unittest discover -s tests -v

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Build frontend
        working-directory: src/frontend
        run: npm run build
